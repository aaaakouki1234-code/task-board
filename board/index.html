<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>Task Board — 電光掲示板</title>
  <link rel="stylesheet" href="../styles/common.css" />
  <link rel="stylesheet" href="../styles/board.css" />
</head>
<body>
  <div class="board" id="board" aria-live="off"></div>

  <div class="controls" id="controls">
    <button class="ctrl-btn" type="button" id="fullscreen-btn">全画面 (F)</button>
    <button class="ctrl-btn" type="button" id="back-btn" onclick="location.href='../'">管理画面</button>
  </div>

  <div class="hint">F: 全画面 ／ Space: 一時停止 ／ ESC: 全画面解除</div>

  <script src="../js/storage.js"></script>
  <script src="../js/settings.js"></script>
  <script src="../js/board.js"></script>
</body>
</html>
