<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1116" />
  <title>Task Board — 管理画面</title>
  <link rel="stylesheet" href="styles/common.css" />
  <link rel="stylesheet" href="styles/admin.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1 class="app-title">Task Board</h1>
      <div class="app-header-right" id="header-actions" hidden>
        <button class="header-btn" id="share-button" type="button" title="このURLを共有">
          <span class="header-btn-icon">🔗</span>
          <span class="header-btn-label">URL共有</span>
        </button>
        <button class="header-btn" id="board-button" type="button" title="電光掲示板を開く">
          <span class="header-btn-icon">📺</span>
          <span class="header-btn-label">電光掲示板</span>
        </button>
      </div>
    </header>

    <!-- Welcome (first visit) -->
    <section class="card welcome-card" id="welcome-card" hidden>
      <h2 class="welcome-title">ようこそ</h2>
      <p class="welcome-desc">
        新しいタスクリストを作成すると、専用のURLが発行されます。<br />
        そのURLを保存しておくと、スマホやPCなど別の端末からも同じタスクが見られます。
      </p>
      <button class="primary-btn" id="create-button" type="button">
        新しいURLを発行する
      </button>
      <p class="welcome-note">
        ※ URLを知っている人は誰でも編集できます。共有先には注意してください。
      </p>
    </section>

    <!-- Main UI (after URL is issued) -->
    <div id="main-ui" hidden>
      <section class="card" aria-labelledby="add-title">
        <h2 class="card-title" id="add-title">タスクを追加</h2>
        <form class="add-form" id="add-form" autocomplete="off">
          <input
            id="add-input"
            type="text"
            name="task"
            placeholder="例: 資料を確認する"
            maxlength="200"
            required
            aria-label="タスク本文"
          />
          <button type="submit" id="add-button">追加</button>
        </form>
      </section>

      <section class="card" aria-labelledby="list-title">
        <h2 class="card-title" id="list-title">
          未完了タスク<span class="task-count" id="task-count"></span>
        </h2>
        <ul class="task-list" id="task-list" role="list"></ul>
      </section>

      <section class="card" aria-labelledby="settings-title">
        <h2 class="card-title" id="settings-title">表示設定</h2>
        <div class="settings-grid">
          <div class="setting-row">
            <label class="setting-label" for="speed-input">
              <span>スクロール速度</span>
              <strong><span id="speed-value">120</span> px/s</strong>
            </label>
            <input id="speed-input" type="range" min="20" max="400" step="5" />
          </div>

          <div class="setting-row">
            <label class="setting-label" for="size-input">
              <span>文字サイズ</span>
              <strong><span id="size-value">96</span> px</strong>
            </label>
            <input id="size-input" type="range" min="32" max="240" step="2" />
          </div>

          <div class="setting-row">
            <span class="setting-label"><span>文字色</span></span>
            <div class="color-presets" id="color-presets" role="group" aria-label="プリセット色"></div>
          </div>

          <div class="setting-row">
            <span class="setting-label"><span>プレビュー</span></span>
            <div class="preview">
              <span class="preview-text" id="preview-text">資料を確認する　🆙　ジムに行く　🆙　メールを返信する</span>
            </div>
          </div>

          <button class="btn-reset" id="reset-button" type="button">既定値に戻す</button>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
